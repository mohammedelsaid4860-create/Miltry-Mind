<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILITARY MIND - MAIN HUD</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --weapon-color: #4b5320; 
            --weapon-glow: rgba(75, 83, 32, 0.4);
            --bg-base: #030406;
            --surface: rgba(15, 18, 25, 0.95);
            --accent: #ffd700; 
            --text-main: #ffffff;
            --text-muted: #7a8499;
            --border-line: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Cairo', sans-serif; 
            overflow-x: hidden;
            min-height: 100vh;
            touch-action: pan-y; 
            -webkit-font-smoothing: antialiased;
        }

        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none; z-index: 9999; opacity: 0.3;
        }

        .hud-header {
            background: rgba(8, 10, 15, 1);
            padding: 15px; border-bottom: 2px solid var(--weapon-color);
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            display: flex; justify-content: space-between; align-items: center;
            transform: translateZ(0); 
        }
        
        .hud-left { display: flex; align-items: center; gap: 12px; }
        .hud-avatar {
            width: 45px; height: 45px; border-radius: 12px;
            background: rgba(0,0,0,0.5); border: 2px solid var(--weapon-color);
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; color: var(--weapon-color);
            box-shadow: 0 0 8px var(--weapon-glow);
            flex-shrink: 0;
        }
        
        .hud-info h1 { font-size: 15px; font-weight: 900; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
        .hud-info p { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 700; }
        .hud-pts {
            background: #111; border: 1px solid var(--border-line);
            padding: 5px 12px; border-radius: 20px;
            display: flex; align-items: center; gap: 6px;
        }
        .hud-pts span { font-family: 'Orbitron'; font-size: 14px; color: var(--accent); font-weight: 900; }

        .tabs-wrapper {
            display: flex; align-items: center; background: rgba(0,0,0,0.8);
            border-bottom: 1px solid var(--border-line);
            padding: 8px 5px; gap: 5px;
        }

        .nav-btn {
            background: var(--surface); color: var(--text-muted);
            border: 1px solid var(--border-line); border-radius: 8px;
            width: 35px; height: 35px; display: flex; justify-content: center; align-items: center;
            font-size: 14px; cursor: pointer; flex-shrink: 0; transition: 0.2s;
        }
        .nav-btn:active { background: var(--weapon-color); color: #fff; transform: scale(0.9); }

        .category-scroll {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            gap: 8px; scrollbar-width: none; flex-grow: 1; padding: 4px 0;
            transform: translateZ(0); scroll-behavior: smooth;
        }
        .category-scroll::-webkit-scrollbar { display: none; }
        
        .cat-tab {
            flex: 0 0 auto; scroll-snap-align: start;
            padding: 8px 16px; border-radius: 20px;
            background: var(--surface); border: 1px solid var(--border-line);
            color: var(--text-muted); font-size: 12px; font-weight: 700;
            display: flex; align-items: center; gap: 6px; cursor: pointer;
            transition: 0.15s ease;
        }
        .cat-tab.active {
            background: var(--weapon-color); color: #fff;
            border-color: var(--weapon-color); box-shadow: 0 0 10px var(--weapon-glow);
        }

        .modules-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            padding: 15px; padding-bottom: 40px;
            min-height: 350px; 
            transform: translateZ(0);
        }

        .module-card {
            background: var(--surface); border: 1px solid var(--border-line);
            border-radius: 12px; padding: 15px 10px; text-align: center;
            display: flex; flex-direction: column; align-items: center;
            position: relative; overflow: hidden; cursor: pointer;
            transition: transform 0.1s;
            will-change: transform;
        }
        .module-card.featured { 
            grid-column: span 2; flex-direction: row; text-align: right; 
            padding: 18px; gap: 15px; border-color: rgba(255,215,0,0.3); 
            background: linear-gradient(135deg, var(--surface), rgba(0,0,0,0.9)); 
        }
        .module-card:active { transform: scale(0.96); border-color: var(--weapon-color); }

        .m-icon {
            width: 40px; height: 40px; border-radius: 10px;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center;
            font-size: 18px; color: var(--text-main); margin-bottom: 10px;
            border: 1px solid var(--border-line); flex-shrink: 0;
        }
        .featured .m-icon { margin-bottom: 0; width: 50px; height: 50px; font-size: 24px; color: var(--accent); }
        
        .offline-emoji { font-size: 20px; font-family: sans-serif; font-style: normal; }
        .featured .offline-emoji { font-size: 26px; }

        .m-content h3 { font-size: 13px; font-weight: 900; margin: 0 0 4px 0; color: var(--text-main); }
        .m-content p { font-size: 10px; color: var(--text-muted); margin: 0; line-height: 1.4; }

        .featured.has-progress { flex-direction: column; align-items: stretch; }
        .featured.has-progress .m-top-section { display: flex; align-items: center; gap: 15px; width: 100%; }
        
        .progress-container {
            width: 100%; margin-top: 12px; background: rgba(0,0,0,0.6); 
            padding: 10px; border-radius: 8px; border: 1px solid var(--border-line);
        }
        .prog-head { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 6px; font-weight: bold; }
        .prog-track { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .prog-fill {
            height: 100%; background: var(--weapon-color); width: 0%; 
            transition: width 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 8px var(--weapon-glow);
        }
        .prog-motivation { font-size: 9px; color: var(--text-muted); margin-top: 5px; text-align: center; }

        /* --- التعديلات الخاصة بقسم (قريباً) --- */
        .module-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .coming-soon-label {
            position: absolute;
            top: 10px;
            left: 10px;
            color: var(--weapon-color);
            font-size: 11px;
            font-weight: 900;
            background: rgba(0,0,0,0.8);
            padding: 3px 10px;
            border-radius: 5px;
            border: 1px solid var(--weapon-color);
            box-shadow: 0 0 8px var(--weapon-glow);
            z-index: 10;
            letter-spacing: 0.5px;
        }

    </style>
</head>

            switchTab(0); 
            setupSwipeGestures(); 
            
            if(!navigator.onLine) {
                document.getElementById('btn-prev').innerHTML = '<span class="offline-emoji">❯</span>';
                document.getElementById('btn-next').innerHTML = '<span class="offline-emoji">❮</span>';
            }
        });

        function loadUserData() {
            let savedData = localStorage.getItem('militaryOS_user');
            let selectedWeapon;

            if(savedData) {
                let uData = JSON.parse(savedData);
                let wKey = uData.weapon || 'war';
                selectedWeapon = weaponStyles[wKey] || weaponStyles['war'];
                
                let rList = ranks[wKey] || ranks['war'];
                let pts = uData.points || 0;
                let rIdx = Math.min(Math.floor(pts / 12000), rList.length - 1);
                
                document.getElementById('hud-name').innerText = uData.name || "مقاتل مجهول";
                document.getElementById('hud-points').innerText = pts;
                document.getElementById('hud-rank').innerText = rList[rIdx];
                document.getElementById('hud-weapon').innerText = selectedWeapon.n;

                if (uData.completed && Array.isArray(uData.completed)) {
                    let currentStage = uData.completed.length; 
                    globalProgress = Math.floor(((currentStage - 1) / 90) * 100);
                } else {
                    globalProgress = 0;
                }
                globalProgress = Math.min(100, Math.max(0, globalProgress));

            } else {
                let keys = Object.keys(weaponStyles);
                let randomKey = keys[Math.floor(Math.random() * keys.length)];
                selectedWeapon = weaponStyles[randomKey];

                document.getElementById('hud-name').innerText = "غير مسجل بالخدمة";
                document.getElementById('hud-rank').innerText = "كاديت زائر";
                document.getElementById('hud-weapon').innerText = "سجل بالمعسكر أولاً";
                globalProgress = 0;
            }

            document.documentElement.style.setProperty('--weapon-color', selectedWeapon.c);
            document.documentElement.style.setProperty('--weapon-glow', `color-mix(in srgb, ${selectedWeapon.c} 40%, transparent)`);
            document.getElementById('hud-icon').innerHTML = getSafeIcon(selectedWeapon.i, selectedWeapon.n);

            updateAllProgressBars();
        }

        function updateAllProgressBars() {
            const allBars = document.querySelectorAll('.prog-fill');
            const allPercents = document.querySelectorAll('[id^="percent-"]');
            const allMotivations = document.querySelectorAll('[id^="motivation-"]');

            let motivationMsg = "لم تبدأ بعد.. الميدان في انتظارك!";
            if(globalProgress > 0 && globalProgress <= 30) motivationMsg = "بداية موفقة، استمر يا بطل!";
            else if(globalProgress > 30 && globalProgress <= 70) motivationMsg = "نصف المشوار انتهى، لا مجال للاستسلام!";
            else if(globalProgress > 70 && globalProgress < 100) motivationMsg = "أداء قتالي استثنائي، التخرج قريب!";
            else if(globalProgress >= 100) motivationMsg = "تم إنجاز كافة المهام بامتياز يا قائد!";

            allBars.forEach(bar => bar.style.width = globalProgress + '%');
            allPercents.forEach(p => p.innerText = globalProgress + '%');
            allMotivations.forEach(m => m.innerText = motivationMsg);
        }

        function buildCategories() {
            const catContainer = document.getElementById('cat-container');
            catContainer.innerHTML = '';

            systemModules.forEach((cat, index) => {
                const btn = document.createElement('div');
                btn.className = `cat-tab ${index === 0 ? 'active' : ''}`;
                btn.id = `tab-${index}`;
                
                const safeIcon = getSafeIcon(cat.categoryIcon, cat.categoryName);
                btn.innerHTML = `${safeIcon} <span>${cat.categoryName}</span>`;
                btn.onclick = () => switchTab(index);
                catContainer.appendChild(btn);
            });
        }

        function updateNavButtonsState() {
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            if(btnPrev) {
                btnPrev.style.opacity = currentCatIndex === 0 ? '0.2' : '1';
                btnPrev.style.pointerEvents = currentCatIndex === 0 ? 'none' : 'auto';
            }
            if(btnNext) {
                btnNext.style.opacity = currentCatIndex === systemModules.length - 1 ? '0.2' : '1';
                btnNext.style.pointerEvents = currentCatIndex === systemModules.length - 1 ? 'none' : 'auto';
            }
        }

        function navPrev() {
            if (currentCatIndex > 0) switchTab(currentCatIndex - 1);
        }

        function navNext() {
            if (currentCatIndex < systemModules.length - 1) switchTab(currentCatIndex + 1);
        }

        function switchTab(index) {
            currentCatIndex = index;
            document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
            const activeBtn = document.getElementById(`tab-${index}`);
            if (activeBtn) {
                activeBtn.classList.add('active');
                activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }
            renderModules(systemModules[index].categoryId);
            updateNavButtonsState();
        }

        function renderModules(categoryId) {
            const modContainer = document.getElementById('modules-container');
            modContainer.innerHTML = ''; 

            const category = systemModules.find(c => c.categoryId === categoryId);
            if(category && category.items) {
                category.items.forEach(item => {
                    const isFeatured = item.featured ? 'featured' : '';
                    const hasProgress = item.hasProgress ? 'has-progress' : '';
                    
                    const isLocked = item.comingSoon ? 'locked' : ''; 
                    
                    const card = document.createElement('div');
                    card.className = `module-card ${isFeatured} ${hasProgress} ${isLocked}`;
                    
                    if (!item.comingSoon) {
                        card.onclick = function() {
                            location.href = 'go:' + item.id; 
                        };
                    }
                    
                    const safeIcon = getSafeIcon(item.icon, item.name);
                    
                    const soonBadge = item.comingSoon ? `<div class="coming-soon-label">قريباً</div>` : '';

                    if (item.hasProgress) {
                        card.innerHTML = `
                            ${soonBadge}
                            <div class="m-top-section">
                                <div class="m-icon">${safeIcon}</div>
                                <div class="m-content">
                                    <h3>${item.name}</h3>
                                    <p>${item.desc}</p>
                                </div>
                            </div>
                            <div class="progress-container">
                                <div class="prog-head">
                                    <span>مستوى إنجاز المعسكر</span>
                                    <span style="color:var(--accent); font-family:'Orbitron';" id="percent-${item.id}">0%</span>
                                </div>
                                <div class="prog-track">
                                    <div class="prog-fill" id="fill-${item.id}"></div>
                                </div>
                                <div class="prog-motivation" id="motivation-${item.id}">جاري التحليل...</div>
                            </div>
                        `;
                    } else {
                        card.innerHTML = `
                            ${soonBadge}
                            <div class="m-icon">${safeIcon}</div>
                            <div class="m-content">
                                <h3>${item.name}</h3>
                                <p>${item.desc}</p>
                            </div>
                        `;
                    }
                    
                    modContainer.appendChild(card);
                });
                updateAllProgressBars();
            }
        }

        function setupSwipeGestures() {
            let touchStartX = 0; let touchStartY = 0;
            let touchEndX = 0; let touchEndY = 0;
            const swipeZone = document.getElementById('modules-container');

            swipeZone.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });

            swipeZone.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                touchEndY = e.changedTouches[0].screenY;
                handleSwipeGesture();
            }, { passive: true });

            function handleSwipeGesture() {
                const diffX = touchEndX - touchStartX;
                const diffY = touchEndY - touchStartY;

                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                    if (diffX > 0) {
                        navNext(); 
                    } else {
                        navPrev();
                    }
                }
            }
        }

        window.addEventListener('storage', loadUserData); 
        window.addEventListener('focus', loadUserData);
        document.addEventListener('itemInserted', loadUserData, false); 
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') loadUserData(); 
        });
        setInterval(loadUserData, 1500); 
    </script>
</body>
</html>
